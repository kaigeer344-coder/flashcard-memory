name: 部署到腾讯云 CloudBase

on:
  push:
    branches: [main]
  workflow_dispatch:

# 同一分支多次推送时取消旧的部署任务，避免并发
concurrency:
  group: deploy-cloudbase-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 CloudBase CLI
        run: npm install -g @cloudbase/cli

      # 用 CloudBase API Key（JWT 格式）登录，配合环境 ID
      - name: 登录 CloudBase
        env:
          TCB_API_KEY: ${{ secrets.TCB_API_KEY }}
          TCB_ENV_ID: ${{ secrets.TCB_ENV_ID }}
        run: tcb login --cloudbase-api-key "$TCB_API_KEY" -e "$TCB_ENV_ID"

      # 准备只含网站文件的临时目录，避免上传 .git / .github
      - name: 准备部署目录
        run: |
          mkdir -p _deploy/assets _deploy/data
          cp index.html _deploy/
          cp 闪卡记忆.html _deploy/
          cp -r assets/* _deploy/assets/
          cp -r data/* _deploy/data/

      - name: 部署静态网站
        env:
          TCB_ENV_ID: ${{ secrets.TCB_ENV_ID }}
        run: tcb hosting deploy _deploy -e "$TCB_ENV_ID"

      - name: 输出访问地址
        env:
          TCB_ENV_ID: ${{ secrets.TCB_ENV_ID }}
        run: |
          echo "=========================================="
          echo "✅ 部署成功"
          echo "🌐 访问 https://${TCB_ENV_ID}-1341005541.tcloudbaseapp.com/"
          echo "=========================================="
